<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warung Rasa Tradisional</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #7D3F3A;
      color: white;
    }
    header {
      background-image: url('header-background.jpg');
      background-size: cover;
      background-position: center;
      padding: 100px 20px;
      text-align: center;
    }
    header h1 {
      font-size: 3em;
      margin: 0;
    }
    header button {
      margin-top: 20px;
      padding: 10px 30px;
      background-color: #F8B133;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .menu-item {
      background-color: #fff;
      color: #000;
      width: 250px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .menu-item img {
      width: 100%;
      border-radius: 10px;
    }
    .features, .team, .testimonials {
      text-align: center;
    }
    .features div, .team div {
      margin: 20px;
    }
    .footer {
      background-color: #602F2B;
      padding: 30px;
      text-align: center;
      font-size: 0.9em;
    }
    .black-section {
      background-color: #1c1c1c;
      color: #fff;
      padding: 50px 20px;
      text-align: center;
    }
  </style>
</head>
      
</html>
